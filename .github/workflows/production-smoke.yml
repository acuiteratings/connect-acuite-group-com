name: Production Smoke

on:
  push:
    branches:
      - main

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for Render deploy and smoke test production
        env:
          PRODUCTION_URL: https://connect.acuite-group.com
          EXPECTED_COMMIT: ${{ github.sha }}
          SMOKE_TIMEOUT_SECONDS: "900"
          SMOKE_POLL_SECONDS: "20"
        run: python scripts/production_smoke_check.py
