<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday - Confetti Burst</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 25%, #ba55d3 50%, #9932cc 75%, #ff1493 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated confetti pieces */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            opacity: 0.8;
        }

        .confetti:nth-child(1) { left: 10%; top: -10px; background: #ffff00; animation: fall 3s linear forwards; }
        .confetti:nth-child(2) { left: 20%; top: -10px; background: #00ff00; animation: fall 3.2s linear forwards; }
        .confetti:nth-child(3) { left: 30%; top: -10px; background: #ff6347; animation: fall 2.8s linear forwards; }
        .confetti:nth-child(4) { left: 40%; top: -10px; background: #00bfff; animation: fall 3.4s linear forwards; }
        .confetti:nth-child(5) { left: 50%; top: -10px; background: #ffd700; animation: fall 3.1s linear forwards; }
        .confetti:nth-child(6) { left: 60%; top: -10px; background: #00ff7f; animation: fall 2.9s linear forwards; }
        .confetti:nth-child(7) { left: 70%; top: -10px; background: #ff1493; animation: fall 3.3s linear forwards; }
        .confetti:nth-child(8) { left: 80%; top: -10px; background: #00ced1; animation: fall 3s linear forwards; }
        .confetti:nth-child(9) { left: 90%; top: -10px; background: #ffff00; animation: fall 3.5s linear forwards; }

        @keyframes fall {
            to {
                transform: translateY(700px) rotate(360deg);
                opacity: 0;
            }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .happy-text {
            font-size: 72px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .name {
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
            margin: 10px 0;
        }

        .photo-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 100%);
            border: 4px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin: 20px 0;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff69b4 0%, #ba55d3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: white;
        }

        .photo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .date-text {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            margin-top: 10px;
        }

        /* Decorative balloons */
        .balloon {
            position: absolute;
            width: 40px;
            height: 50px;
            border-radius: 50% 50% 50% 0;
            border: 2px solid;
        }

        .balloon:nth-child(10) {
            left: 50px;
            top: 50px;
            background: #ffff00;
            border-color: #ffd700;
            transform: rotate(-45deg);
        }

        .balloon:nth-child(11) {
            right: 60px;
            top: 80px;
            background: #00ff00;
            border-color: #008000;
            transform: rotate(45deg);
        }

        .balloon:nth-child(12) {
            left: 80px;
            bottom: 100px;
            background: #ff6347;
            border-color: #cd5c5c;
            transform: rotate(-30deg);
        }

        .balloon:nth-child(13) {
            right: 100px;
            bottom: 120px;
            background: #00bfff;
            border-color: #0099cc;
            transform: rotate(30deg);
        }

        /* Scattered dots background pattern */
        .dot {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
        }

        .dot:nth-child(14) { width: 20px; height: 20px; background: #fff; left: 15%; top: 20%; }
        .dot:nth-child(15) { width: 15px; height: 15px; background: #ffff00; left: 85%; top: 15%; }
        .dot:nth-child(16) { width: 25px; height: 25px; background: #00ff00; left: 10%; bottom: 20%; }
        .dot:nth-child(17) { width: 18px; height: 18px; background: #ff6347; right: 10%; bottom: 25%; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Confetti animation -->
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>

        <!-- Balloons -->
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>

        <!-- Background dots -->
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>

        <!-- Main content -->
        <div class="content">
            <div class="happy-text">🎉 Happy Birthday 🎉</div>
            <div class="name">{{NAME}}</div>
            <div class="photo-container">
                <div class="photo-placeholder">
                    <img src="{{PHOTO_URL}}" alt="Birthday person" style="display: none;">
                </div>
            </div>
            <div class="date-text">{{DATE}}</div>
        </div>
    </div>

    <script>
        // Load photo if URL is provided
        const photoUrl = '{{PHOTO_URL}}';
        if (photoUrl && photoUrl !== '{{PHOTO_URL}}') {
            const img = document.querySelector('.photo-placeholder img');
            img.style.display = 'block';
        }
    </script>
</body>
</html>
