<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday - Starry Night</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .container {
            width: 1200px;
            height: 675px;
            background: linear-gradient(180deg, #0a1929 0%, #1a2447 50%, #2d3e5f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #FFD700;
            border-radius: 50%;
            opacity: 0.8;
        }

        .star-large {
            width: 4px;
            height: 4px;
            opacity: 1;
        }

        .star-xlarge {
            width: 6px;
            height: 6px;
            opacity: 1;
        }

        /* Sparkle effect */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .star {
            animation: twinkle 3s infinite;
        }

        /* Gradient wave background */
        .wave {
            position: absolute;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 191, 255, 0.2) 0%, transparent 50%);
            top: -50%;
            left: -50%;
            opacity: 0.6;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .happy-birthday {
            font-size: 68px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #FFD700;
            text-shadow:
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 40px rgba(255, 215, 0, 0.5),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6));
        }

        .photo-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border: 4px solid #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .photo-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent);
            border-radius: 50%;
            pointer-events: none;
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 215, 0, 0.6);
        }

        .name {
            font-size: 56px;
            font-weight: bold;
            color: #E0F2FE;
            text-shadow:
                0 0 15px rgba(255, 215, 0, 0.5),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        .date {
            font-size: 24px;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
            padding: 12px 25px;
            border: 2px solid #FFD700;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        /* Decorative sparkles */
        .sparkle {
            position: absolute;
            color: #FFD700;
            opacity: 0.8;
            animation: sparkle-anim 1.5s infinite;
        }

        @keyframes sparkle-anim {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1); }
        }

        .sparkle-1 { top: 80px; left: 200px; font-size: 24px; }
        .sparkle-2 { top: 150px; right: 250px; font-size: 20px; }
        .sparkle-3 { bottom: 120px; left: 150px; font-size: 22px; }
        .sparkle-4 { bottom: 100px; right: 180px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="wave"></div>

        <!-- Stars scattered throughout -->
        <div class="star star-xlarge" style="top: 50px; left: 100px;"></div>
        <div class="star star-large" style="top: 120px; left: 250px;"></div>
        <div class="star" style="top: 80px; right: 180px;"></div>
        <div class="star star-large" style="top: 200px; right: 80px;"></div>
        <div class="star" style="top: 350px; left: 80px;"></div>
        <div class="star star-xlarge" style="top: 420px; left: 350px;"></div>
        <div class="star" style="top: 300px; right: 120px;"></div>
        <div class="star star-large" style="bottom: 80px; left: 200px;"></div>
        <div class="star" style="bottom: 120px; right: 250px;"></div>
        <div class="star star-large" style="bottom: 150px; left: 600px;"></div>

        <!-- Sparkles around content -->
        <div class="sparkle sparkle-1">✨</div>
        <div class="sparkle sparkle-2">✨</div>
        <div class="sparkle sparkle-3">✨</div>
        <div class="sparkle sparkle-4">✨</div>

        <div class="content">
            <div class="happy-birthday">HAPPY BIRTHDAY</div>

            <div class="photo-circle" style="background-image: url('{{PHOTO_URL}}');">
                <div class="photo-placeholder">👤</div>
            </div>

            <div class="name">{{NAME}}</div>

            <div class="date">{{DATE}}</div>
        </div>
    </div>
</body>
</html>
