<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday - Cherry Blossom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        .card-container {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 25%, #f5f5f5 75%, #ede7f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Cherry blossom petals using CSS */
        .petal {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
        }

        .petal::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.8);
            border-radius: 50%;
            filter: blur(0.5px);
        }

        .petal1 {
            width: 35px;
            height: 35px;
            background: #f48fb1;
            top: 10%;
            left: 5%;
            animation: fall 8s linear infinite;
        }

        .petal2 {
            width: 40px;
            height: 40px;
            background: #f06292;
            top: 15%;
            right: 8%;
            animation: fall 10s linear infinite 1s;
        }

        .petal3 {
            width: 30px;
            height: 30px;
            background: #ec407a;
            top: 20%;
            left: 15%;
            animation: fall 9s linear infinite 2s;
        }

        .petal4 {
            width: 38px;
            height: 38px;
            background: #f48fb1;
            bottom: -50px;
            right: 20%;
            animation: fall-up 12s linear infinite;
        }

        .petal5 {
            width: 35px;
            height: 35px;
            background: #f06292;
            bottom: -80px;
            left: 10%;
            animation: fall-up 11s linear infinite 1.5s;
        }

        .flower {
            position: absolute;
            animation: float-flower 6s ease-in-out infinite;
        }

        .flower-center {
            width: 20px;
            height: 20px;
            background: #ffd54f;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .flower-petal {
            position: absolute;
            width: 15px;
            height: 25px;
            background: #f48fb1;
            border-radius: 50%;
            top: 50%;
            left: 50%;
        }

        .flower1 {
            width: 60px;
            height: 60px;
            top: 20%;
            right: 15%;
        }

        .flower1 .flower-petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateY(-20px); }
        .flower1 .flower-petal:nth-child(2) { transform: translate(-50%, -50%) rotate(72deg) translateY(-20px); }
        .flower1 .flower-petal:nth-child(3) { transform: translate(-50%, -50%) rotate(144deg) translateY(-20px); }
        .flower1 .flower-petal:nth-child(4) { transform: translate(-50%, -50%) rotate(216deg) translateY(-20px); }
        .flower1 .flower-petal:nth-child(5) { transform: translate(-50%, -50%) rotate(288deg) translateY(-20px); }

        .flower2 {
            width: 50px;
            height: 50px;
            bottom: 15%;
            left: 8%;
            animation-delay: 2s;
        }

        .flower2 .flower-petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateY(-17px); }
        .flower2 .flower-petal:nth-child(2) { transform: translate(-50%, -50%) rotate(72deg) translateY(-17px); }
        .flower2 .flower-petal:nth-child(3) { transform: translate(-50%, -50%) rotate(144deg) translateY(-17px); }
        .flower2 .flower-petal:nth-child(4) { transform: translate(-50%, -50%) rotate(216deg) translateY(-17px); }
        .flower2 .flower-petal:nth-child(5) { transform: translate(-50%, -50%) rotate(288deg) translateY(-17px); }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(750px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes fall-up {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-750px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes float-flower {
            0%, 100% {
                transform: translateX(0) translateY(0);
            }
            25% {
                transform: translateX(20px) translateY(-15px);
            }
            50% {
                transform: translateX(0) translateY(-30px);
            }
            75% {
                transform: translateX(-20px) translateY(-15px);
            }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 250, 250, 0.9);
            padding: 60px 80px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(236, 64, 122, 0.15);
            backdrop-filter: blur(5px);
        }

        .happy-text {
            font-size: 42px;
            font-weight: 300;
            color: #e91e63;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .birthday-text {
            font-size: 75px;
            font-weight: 300;
            color: #c2185b;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }

        .name-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
        }

        .photo-circle {
            width: 145px;
            height: 145px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f48fb1 0%, #f06292 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: white;
            border: 3px solid white;
            box-shadow: 0 12px 35px rgba(236, 64, 122, 0.25);
            overflow: hidden;
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-text {
            font-size: 50px;
            font-weight: 400;
            color: #880e4f;
            letter-spacing: 1px;
        }

        .date-text {
            font-size: 15px;
            color: #c2185b;
            margin-top: 15px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* Decorative line */
        .decoration-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f06292, transparent);
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="petal petal1"></div>
        <div class="petal petal2"></div>
        <div class="petal petal3"></div>
        <div class="petal petal4"></div>
        <div class="petal petal5"></div>

        <div class="flower flower1">
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-center"></div>
        </div>

        <div class="flower flower2">
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-petal"></div>
            <div class="flower-center"></div>
        </div>

        <div class="content">
            <div class="happy-text">Happy</div>
            <div class="birthday-text">BIRTHDAY</div>
            <div class="decoration-line"></div>
            <div class="name-section">
                <div class="photo-circle">
                    <img src="{{PHOTO_URL}}" alt="Birthday person" onerror="this.parentElement.textContent='🌸'">
                </div>
                <div class="name-text">{{NAME}}</div>
            </div>
            <div class="date-text">{{DATE}}</div>
        </div>
    </div>
</body>
</html>
