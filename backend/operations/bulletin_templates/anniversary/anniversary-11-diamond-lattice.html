<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Work Anniversary - Diamond Lattice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #e8e8e8 0%, #f5f5f5 50%, #d9d9d9 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lattice-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.15;
        }

        .lattice-bg svg {
            width: 100%;
            height: 100%;
        }

        .sparkle {
            position: absolute;
            font-size: 24px;
            animation: twinkle 3s infinite;
        }

        .sparkle:nth-child(2) {
            top: 10%;
            left: 15%;
            animation-delay: 0s;
        }

        .sparkle:nth-child(3) {
            top: 25%;
            right: 12%;
            animation-delay: 0.6s;
        }

        .sparkle:nth-child(4) {
            bottom: 20%;
            left: 10%;
            animation-delay: 1.2s;
        }

        .sparkle:nth-child(5) {
            bottom: 15%;
            right: 15%;
            animation-delay: 1.8s;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
        }

        .photo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #c0d9e8 0%, #a8c5d9 100%);
            border: 4px solid #4a5f7f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #7a8fa5;
            box-shadow: 0 8px 20px rgba(74, 95, 127, 0.25);
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .anniversary-title {
            font-size: 48px;
            font-weight: 700;
            color: #2c3e50;
            margin: 20px 0;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }

        .name {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #4a5f7f 0%, #6b8fb5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 15px 0;
            letter-spacing: 1px;
        }

        .date {
            font-size: 20px;
            color: #5a6f7f;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 15px;
        }

        .accent-line {
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #4a5f7f, transparent);
            margin: 20px auto;
            border-radius: 2px;
        }

        .corner-accent {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid #4a5f7f;
            opacity: 0.2;
        }

        .corner-accent.top-left {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-accent.bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="lattice-bg" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="diamond-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
                    <path d="M 50 0 L 100 50 L 50 100 L 0 50 Z" fill="none" stroke="#4a5f7f" stroke-width="2"/>
                </pattern>
            </defs>
            <rect width="1200" height="675" fill="url(#diamond-pattern)"/>
        </svg>

        <div class="sparkle">✨</div>
        <div class="sparkle">💎</div>
        <div class="sparkle">✨</div>
        <div class="sparkle">💎</div>

        <div class="corner-accent top-left"></div>
        <div class="corner-accent bottom-right"></div>

        <div class="content">
            <div class="photo-circle">
                <img src="{{PHOTO_URL}}" alt="{{NAME}}">
            </div>
            <div class="anniversary-title">Happy Work Anniversary</div>
            <div class="accent-line"></div>
            <div class="name">{{NAME}}</div>
            <div class="date">{{DATE}}</div>
        </div>
    </div>
</body>
</html>
