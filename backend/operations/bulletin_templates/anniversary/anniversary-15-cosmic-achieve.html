<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Work Anniversary - Cosmic Achievement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 1200px;
            height: 675px;
            background: radial-gradient(ellipse at 30% 40%, #2a1a5e 0%, #1a0f3a 30%, #0a0515 60%, #000000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .starfield {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #ffffff 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            animation: twinkle-star 3s infinite;
        }

        .star.small {
            width: 2px;
            height: 2px;
        }

        .star.medium {
            width: 4px;
            height: 4px;
        }

        .star.large {
            width: 6px;
            height: 6px;
        }

        @keyframes twinkle-star {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .nebula {
            position: absolute;
            opacity: 0.3;
        }

        .nebula-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse at 30% 30%, #6b46c1 0%, rgba(107, 70, 193, 0.3) 40%, transparent 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            filter: blur(40px);
        }

        .nebula-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(ellipse at 50% 50%, #ec4899 0%, rgba(236, 72, 153, 0.2) 35%, transparent 70%);
            top: 200px;
            right: -80px;
            border-radius: 50%;
            filter: blur(45px);
        }

        .nebula-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse at 40% 40%, #06b6d4 0%, rgba(6, 182, 212, 0.2) 40%, transparent 70%);
            bottom: -80px;
            left: 200px;
            border-radius: 50%;
            filter: blur(40px);
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
        }

        .photo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #6b46c1 0%, #ec4899 50%, #06b6d4 100%);
            border: 4px solid #06b6d4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
            box-shadow: 0 0 40px rgba(107, 70, 193, 0.8), 0 0 20px rgba(6, 182, 212, 0.6);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 40px rgba(107, 70, 193, 0.8), 0 0 20px rgba(6, 182, 212, 0.6);
            }
            50% {
                box-shadow: 0 0 60px rgba(107, 70, 193, 1), 0 0 30px rgba(6, 182, 212, 0.8), 0 0 15px rgba(236, 72, 153, 0.6);
            }
        }

        .anniversary-title {
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            margin: 20px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(107, 70, 193, 0.8);
        }

        .name {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(90deg, #06b6d4, #06f, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 15px 0;
            letter-spacing: 1px;
            filter: drop-shadow(0 0 10px rgba(107, 70, 193, 0.5));
        }

        .date {
            font-size: 20px;
            color: #06b6d4;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 15px;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.6);
        }

        .star-accents {
            font-size: 32px;
            margin: 20px 0;
            letter-spacing: 12px;
            background: linear-gradient(90deg, #fbbf24, #06b6d4, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse-accent 2s ease-in-out infinite;
        }

        @keyframes pulse-accent {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .accent-line {
            width: 180px;
            height: 3px;
            background: linear-gradient(90deg, #06b6d4, #ec4899, #fbbf24);
            margin: 20px auto;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="starfield">
            <div class="nebula nebula-1"></div>
            <div class="nebula nebula-2"></div>
            <div class="nebula nebula-3"></div>

            <div class="star small" style="top: 10%; left: 15%; animation-delay: 0s;"></div>
            <div class="star medium" style="top: 25%; right: 20%; animation-delay: 0.5s;"></div>
            <div class="star small" style="bottom: 30%; left: 10%; animation-delay: 1s;"></div>
            <div class="star large" style="top: 40%; left: 30%; animation-delay: 1.5s;"></div>
            <div class="star medium" style="bottom: 20%; right: 15%; animation-delay: 2s;"></div>
            <div class="star small" style="top: 15%; left: 70%; animation-delay: 0.8s;"></div>
            <div class="star medium" style="top: 60%; right: 30%; animation-delay: 1.2s;"></div>
            <div class="star small" style="bottom: 40%; right: 40%; animation-delay: 1.8s;"></div>
        </div>

        <div class="content">
            <div class="photo-circle">
                <img src="{{PHOTO_URL}}" alt="{{NAME}}">
            </div>
            <div class="anniversary-title">Happy Work Anniversary</div>
            <div class="star-accents">⭐ ✨ ⭐</div>
            <div class="accent-line"></div>
            <div class="name">{{NAME}}</div>
            <div class="date">{{DATE}}</div>
        </div>
    </div>
</body>
</html>
