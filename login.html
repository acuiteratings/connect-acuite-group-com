{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Login | Acuité Connect</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="connect-auth-body">
  <div class="connect-auth-shell">
    <header class="connect-auth-header">
      <div class="connect-brand-lockup">
        <img src="{% static 'img/acuite-logo.png' %}" alt="Acuité" class="connect-brand-logo">
        <span class="connect-brand-divider" aria-hidden="true"></span>
        <span class="connect-brand-text">Connect</span>
      </div>
    </header>

    <main class="connect-auth-main">
      <section class="auth-wrap">
        <div class="auth-card connect-auth-card">
          <div class="connect-auth-card-head">
            <p class="widget-kicker">Employee Access</p>
            <h2>Login</h2>
          </div>

          <div class="auth-sequence">
            <form id="connect-access-form" class="stack-form" autocomplete="off" novalidate>
              <div class="form-field">
                <label for="login-email">Email</label>
                <div class="auth-inline-group">
                  <div class="auth-inline-field">
                    <input id="login-email" name="email" type="email" placeholder="name@acuite.in" autocomplete="email" required>
                  </div>
                  <button type="submit" name="action" value="send_code" class="button connect-button-secondary auth-inline-button">SEND CODE</button>
                </div>
                <div class="field-error" id="email-error" hidden></div>
              </div>

              <div class="form-field">
                <label for="login-code">OTP</label>
                <div class="auth-inline-group">
                  <div class="auth-inline-field">
                    <input id="login-code" name="verification_code" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit OTP" autocomplete="one-time-code" disabled required>
                  </div>
                  <button type="submit" name="action" value="validate_code" class="button connect-button-secondary auth-inline-button" id="validate-code-button" disabled>VALIDATE</button>
                </div>
                <div class="field-error" id="code-error" hidden></div>
              </div>
            </form>

            <div class="auth-step-line">
              <strong id="auth-step-label">Step 1 of 3</strong>
              <span id="auth-step-copy">Request an OTP on your employee email to begin sign-in.</span>
            </div>

            <div class="auth-status" id="auth-status" hidden></div>

            <form id="connect-password-form" class="stack-form auth-password-form" autocomplete="off" novalidate>
              <div class="auth-autofill-decoy" aria-hidden="true">
                <input type="text" tabindex="-1" autocomplete="username" name="connect_username_hint">
                <input type="password" tabindex="-1" autocomplete="current-password" name="connect_password_hint">
              </div>

              <div class="form-field">
                <label for="login-password">PASSWORD</label>
                <div class="password-input-wrap">
                  <input id="login-password" name="login_secret" type="password" placeholder="Enter your password" autocomplete="current-password" disabled required>
                  <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" aria-pressed="false" disabled>Show</button>
                </div>
                <div class="field-error" id="password-error" hidden></div>
              </div>

              <div class="auth-form-actions">
                <button type="button" class="auth-text-link" id="forgot-password-button">Forgot Password?</button>
              </div>

              <button type="submit" class="button connect-button-primary button-block" id="login-button" disabled>LOG IN</button>
            </form>

            <form id="connect-password-change-form" class="stack-form auth-password-form password-reset-panel" autocomplete="off" novalidate hidden>
              <div class="form-field">
                <label for="new-password">New Password</label>
                <div class="password-input-wrap">
                  <input id="new-password" name="new_password" type="password" placeholder="Create a new password" autocomplete="new-password" required>
                  <button type="button" class="password-toggle" id="new-password-toggle" aria-label="Show new password" aria-pressed="false">Show</button>
                </div>
                <div class="field-error" id="new-password-error" hidden></div>
              </div>

              <div class="form-field">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-input-wrap">
                  <input id="confirm-password" name="confirm_password" type="password" placeholder="Re-enter the new password" autocomplete="new-password" required>
                  <button type="button" class="password-toggle" id="confirm-password-toggle" aria-label="Show confirm password" aria-pressed="false">Show</button>
                </div>
                <div class="field-error" id="confirm-password-error" hidden></div>
              </div>

              <button type="submit" class="button connect-button-primary button-block" id="change-password-button">UPDATE PASSWORD &amp; LOG IN</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <footer class="connect-site-footer auth-footer">
    <span id="build-number-display">Built with care by Sankar Chakraborti | BUILD {{ build_number }}</span>
  </footer>

  <script src="{% static 'js/auth.js' %}" defer></script>
  <script src="{% static 'js/login.js' %}" defer></script>
</body>
</html>
